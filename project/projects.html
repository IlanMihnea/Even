<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="design/logomark-even.svg">
  <link rel="apple-touch-icon" href="design/logomark-even.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ansambluri rezidențiale noi · EVEN</title>
  <meta name="description" content="Proiecte rezidențiale noi în București — pre-vânzare, construcție și finalizate. Selectate de EVEN.">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/projects.css">
</head>
<body data-page="proiecte" data-subpage="projects-list">

  <header id="navbar" class="navbar"></header>

  <div class="pj-bg-grain" aria-hidden="true"></div>
  <div class="pj-bg-light" aria-hidden="true"></div>

  <section class="pj-masthead">
    <div class="pj-masthead-inner">
      <span class="pj-mast-mark">— Ansambluri —</span>
      <span class="pj-mast-title">Even · Proiecte Noi</span>
      <span class="pj-mast-edition" id="projectsCount">— listings</span>
    </div>
  </section>

  <section class="pj-hero">
    <div class="pj-hero-inner">
      <span class="pj-eyebrow">— Ediția curentă</span>
      <h1 class="pj-h1">Ansambluri rezidențiale <em>noi</em>.</h1>
      <p class="pj-lede">
        Investește în casa ta de mâine. Selecție curată de proiecte în pre-vânzare,
        construcție sau finalizate — toate verificate înainte de listare.
      </p>
    </div>
  </section>

  <section class="pj-filters">
    <div class="pj-filters-inner">
      <span class="pj-eyebrow">— Filtrează</span>
      <div class="pj-filter-grid">
        <div class="pj-field">
          <label>Oraș</label>
          <input type="text" data-pf="oras" placeholder="București, Cluj…">
        </div>
        <div class="pj-field">
          <label>Status</label>
          <select data-pf="status">
            <option value="">Toate</option>
            <option value="pre-vanzare">Pre-vânzare</option>
            <option value="construire">În construcție</option>
            <option value="finalizat">Finalizat</option>
          </select>
        </div>
        <div class="pj-field">
          <label>Tip unitate</label>
          <select data-pf="tipUnitate">
            <option value="">Toate</option>
            <option>Studio</option>
            <option>1 cameră</option>
            <option>2 camere</option>
            <option>3 camere</option>
            <option>Penthouse</option>
          </select>
        </div>
        <div class="pj-field">
          <label>Preț max (€)</label>
          <input type="number" data-pf="pretMax" placeholder="ex. 250000">
        </div>
      </div>
    </div>
  </section>

  <section class="pj-grid-section">
    <div class="pj-grid-wrap">
      <div class="projects-grid pj-grid" id="projectsGrid"></div>
    </div>
  </section>

  <footer id="footer" class="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db.js"></script>
  <script src="js/main.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
