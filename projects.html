<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proiecte rezidențiale noi | EVEN</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/projects.css">
</head>
<body data-page="proiecte" data-subpage="projects-list">

  <header id="navbar" class="navbar"></header>

  <section class="page-header" style="border-top: 3px solid var(--gold); background: linear-gradient(to bottom, var(--accent-proiecte-soft) 0%, var(--gray-50) 100%)">
    <div class="container">
      <div class="breadcrumbs"><a href="index.html">Acasă</a> / Proiecte Noi</div>
      <h1>Proiecte rezidențiale noi</h1>
      <p class="subtitle">Investește în casa ta de mâine — ansambluri în pre-vânzare, construire sau finalizate, livrate de dezvoltatori de încredere.</p>
    </div>
  </section>

  <div class="container">
    <div class="projects-layout">
      <div class="projects-filter-bar">
        <div class="form-group">
          <label>Oraș</label>
          <input type="text" data-pf="oras" placeholder="București, Cluj…">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select data-pf="status">
            <option value="">Toate</option>
            <option value="pre-vanzare">Pre-vânzare</option>
            <option value="construire">În construcție</option>
            <option value="finalizat">Finalizat</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tip unitate</label>
          <select data-pf="tipUnitate">
            <option value="">Toate</option>
            <option>Studio</option>
            <option>1 cameră</option>
            <option>2 camere</option>
            <option>3 camere</option>
            <option>Penthouse</option>
          </select>
        </div>
        <div class="form-group">
          <label>Preț max (€)</label>
          <input type="number" data-pf="pretMax" placeholder="ex: 250000">
        </div>
        <div class="form-group" style="display:flex;align-items:center;color:var(--gray-500);font-size:14px;padding-top:24px">
          <span id="projectsCount"></span>
        </div>
      </div>

      <div class="projects-grid" id="projectsGrid"></div>
    </div>
  </div>

  <footer id="footer" class="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db.js"></script>
  <script src="js/main.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
